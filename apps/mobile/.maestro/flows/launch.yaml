# Smoke flow: launches the app on the iOS Simulator and asserts the
# sign-in screen renders. Sibling flows cover individual user journeys
# (e.g. sign-in.yaml — slice 6, me-screen.yaml — slice 7).
#
# Run locally: `pnpm test:e2e:mobile`
# CI: macOS runner via the mobile-e2e job, path-filtered to apps/mobile/**.
appId: dev.matthewcarr.travelplanner
---
- launchApp
- assertVisible:
    id: 'login-screen-root'
- assertVisible: 'Sign in with Google'
