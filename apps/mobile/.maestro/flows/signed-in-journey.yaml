# Authenticated journey flow (SPEC-014, EPIC-004 slice 2 — the milestone).
#
# Walks the journey a traveller actually takes: launch → sign in → see the
# seeded trips → open Profile → sign out → back at sign-in. This is the first
# flow to go PAST the sign-in screen, made possible by the test-auth seam:
#
#   - The E2E app build inlines EXPO_PUBLIC_E2E_AUTH=1, so the sign-in screen's
#     browser leg is the substitute (src/auth/e2e-browser-leg.ts) that calls
#     the server's gated POST /api/v1/auth/mobile/test-token instead of opening
#     Google. PKCE start, /exchange, Keychain, /me, and AuthGuard all stay real
#     — only the human-at-Google step is replaced.
#   - The backend runs with E2E_TEST_AUTH=1 (job-level env), which is the ONLY
#     place that endpoint is enabled; it 404s everywhere else (double-gated,
#     never on Vercel — see the route handler + route.int-test.ts).
#
# Asserts against the deterministic e2e fixtures
# (apps/web/src/infrastructure/db/seed/e2e-fixtures.ts): the "Kyoto Adventure"
# trip, id b0000000-0e2e-4000-8000-000000000001.
#
# testID selectors only (per mobile AGENTS.md) — text is cheap to change, IDs
# are load-bearing. Slice 3 adds detail-screen assertions on this same harness.
#
# Requires the E2E build + backend flags; run in CI via the mobile-e2e job, or
# locally with both flags set (slice 4 automates the local backend).
#
# extendedWaitUntil headroom matches sign-in.yaml's rationale: cold-start +
# auth resolution + the round-trip through the seam can exceed Maestro's ~30s
# default before each screen settles.
appId: dev.matthewcarr.travelplanner
---
- launchApp
- extendedWaitUntil:
    visible:
      id: 'login-screen-root'
    timeout: 60000
- tapOn:
    id: 'login-google-button'
- extendedWaitUntil:
    visible:
      id: 'trips-screen-root'
    timeout: 60000
- assertVisible:
    id: 'trips-screen-item-b0000000-0e2e-4000-8000-000000000001'
- tapOn:
    id: 'trips-screen-profile'
- extendedWaitUntil:
    visible:
      id: 'me-screen-sign-out'
    timeout: 30000
- tapOn:
    id: 'me-screen-sign-out'
- extendedWaitUntil:
    visible:
      id: 'login-screen-root'
    timeout: 30000
