name: Feature request (auto-spec)
description: Describe a feature. The draft-spec routine will turn this into a SPEC PR.
title: "feat: "
labels: ["ai:plan"]
body:
  - type: markdown
    attributes:
      value: |
        Opening this issue fires the **draft-spec routine** (per ADR 057). It will:

        1. Read this issue end-to-end.
        2. Apply the engineering-principles plugin.
        3. Write `docs/specs/SPEC-NNN-<slug>.md` on a `claude/spec-NNN-<slug>` branch.
        4. Open a PR for review with any unresolved questions surfaced in §Open Questions.

        Aim to be **specific where it's load-bearing** (acceptance, constraints) and **comfortable with ambiguity elsewhere** — the routine surfaces ambiguity in §Open Questions, you resolve it in PR review.
  - type: input
    id: goal
    attributes:
      label: Goal (one sentence)
      description: What does "done" look like to a user?
      placeholder: "A user can [verb] [noun] from [where] and see [observable result]."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's in. What's deliberately out. What's deferred.
      placeholder: |
        **In scope:**
        -

        **Out of scope (deliberately):**
        -

        **Out of scope (deferred):**
        -
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete, testable. The routine will translate these into e2e/integration tests.
      placeholder: |
        - [ ] When ..., the user sees ...
        - [ ] When ..., the system records ...
    validations:
      required: true
  - type: input
    id: parent_epic
    attributes:
      label: Parent epic (if any)
      description: "Link or EPIC-NNN. Leave blank for standalone features."
      placeholder: "EPIC-002 (or leave blank)"
  - type: textarea
    id: constraints
    attributes:
      label: Constraints / non-obvious context
      description: Hidden constraints, prior incidents, external deps, deadlines. The routine can't infer these.
      placeholder: |
        - Must not break the existing /api/v1/me contract (SPEC-001).
        - ...
  - type: dropdown
    id: app
    attributes:
      label: Which app(s)?
      multiple: true
      options:
        - "apps/web"
        - "apps/mobile"
        - "packages/shared"
        - "infra"
        - "cross-cutting"
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ---
        When you submit, the `ai:plan` label fires the **draft-spec routine**. The PR will be linked back here as a comment, and the issue will be labelled `ai:planned`. To revise the resulting SPEC, drop comments on the PR and apply the `ai:revise-now` label. To approve and trigger implementation, merge the PR with the `ai:implement` label.
