version: 2

updates:
  # ── npm / pnpm dependencies ─────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      prefix-development: chore
    labels:
      - dependencies
    # Held dependencies — see the cited ADRs / tech-debt entries. These are
    # deliberate pins, not neglect; remove the ignore when the hold lifts.
    ignore:
      # Expo SDK family pinned to SDK 54 until App Store Expo Go supports a
      # newer SDK (or a later epic funds EAS Build). ADR 053 / TD-003. A major
      # bump here jumps the RN / jest-expo toolchain out of lockstep.
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@expo/*"
        update-types: ["version-update:semver-major"]
      # Expo-SDK-coupled but NOT prefixed `expo-`, so the glob above misses
      # them (they regenerated as #124 / #125). jest-expo + babel-preset-expo
      # track the SDK version (54 → 56 is a major SDK jump). ADR 053 / TD-003.
      - dependency-name: "jest-expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "babel-preset-expo"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 on hold pending ecosystem readiness (drizzle-kit, vitest,
      # next swc, biome). TD-006. Minor/patch within 5.x still flow.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Vite 8 on hold until vitest declares vite 8 in its peer range. TD-007.
      # Bumping vite alone (without vitest support) breaks the test runner.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # React Native stack is version-locked to the Expo SDK (ADR 053 / TD-003)
      # — Expo manages these via `expo install --fix`. Dependabot classifies RN
      # minor jumps (e.g. 0.81→0.85) as "minor", so they slip into the group
      # and break the mobile build out of SDK lockstep (see #114 / #121). Hold
      # minor + major; patch within the SDK's pinned line still flows.
      - dependency-name: "react-native"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-test-renderer"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # `react` / `@types/react` are shared web+mobile but version-locked to the
      # Expo SDK in this monorepo (single hoisted version). react 19.1→19.2
      # (a "minor") broke BOTH web unit tests and the mobile build in #122.
      # Hold minor+major until a deliberate, tested react upgrade; patch flows.
      - dependency-name: "react"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # jest is pinned by jest-expo (SDK 54 → jest 29). jest 30 (major) broke
      # the test suites in #123. ADR 053 / TD-003. Minor/patch within 29 flows.
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/jest"
        update-types: ["version-update:semver-major"]
    # Group all minor and patch updates into a single PR to reduce noise.
    # Major versions still land as individual PRs so breaking-change
    # changelogs can be reviewed separately.
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
