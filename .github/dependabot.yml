version: 2

updates:
  # ── npm / pnpm dependencies ─────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      prefix-development: chore
    labels:
      - dependencies
    # Held dependencies — see the cited ADRs / tech-debt entries. These are
    # deliberate pins, not neglect; remove the ignore when the hold lifts.
    ignore:
      # ── Expo-SDK-managed deps — ignore ALL updates (incl. patch) ──────────
      # Expo SDK 54 pins these to EXACT versions; they must move together as a
      # set via `expo install --fix`, never piecemeal via Dependabot. Even a
      # "patch" (e.g. react-native 0.81.5→0.81.6, expo-router 6.0.23→6.0.24)
      # breaks the SDK lockstep — confirmed by #129 timing out 3/3 on a CLEAN
      # build (TD-009). So no `update-types` filter here = ignore every update;
      # the whole set re-aligns only when the SDK is bumped (ADR 053 / TD-003).
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "@expo/*"
      - dependency-name: "jest-expo"
      - dependency-name: "babel-preset-expo"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "@react-native/*"
      - dependency-name: "react-test-renderer"
      # `react` / `@types/react` are shared web+mobile but hoisted to one
      # version, pinned by the Expo SDK. react 19.1→19.2 broke web + mobile
      # (#122). Hold entirely until a deliberate, tested react upgrade.
      - dependency-name: "react"
      - dependency-name: "@types/react"
      # jest stack is the Expo (jest-expo) test toolchain — mobile-only, SDK-
      # pinned to jest 29. jest 30 broke the suites (#123). Hold entirely.
      - dependency-name: "jest"
      - dependency-name: "@types/jest"
      # ── Ecosystem-readiness holds (major only; patch/minor still flow) ────
      # TypeScript 6 hold pending drizzle-kit / vitest / next swc / biome
      # support. TD-006.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Vite 8 hold until vitest declares vite 8 in its peer range. TD-007.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
    # Group all minor and patch updates into a single PR to reduce noise.
    # Major versions still land as individual PRs so breaking-change
    # changelogs can be reviewed separately.
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
