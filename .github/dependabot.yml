version: 2

updates:
  # ── npm / pnpm dependencies ─────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      prefix-development: chore
    labels:
      - dependencies
    # Group all minor and patch updates into a single PR to reduce noise.
    # Major versions still land as individual PRs so breaking-change
    # changelogs can be reviewed separately.
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
