name: Infra Preview Apply

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
  workflow_dispatch:
    inputs:
      open_previews_json:
        description: 'Optional JSON map of open previews: {"123":"branch-name"}'
        required: false
        default: ""

jobs:
  apply:
    name: Apply preview stack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      TF_IN_AUTOMATION: true
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN }}
      TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
      TF_VAR_vercel_team_id: ${{ vars.VERCEL_TEAM_ID }}
      TF_VAR_neon_org_id: ${{ vars.NEON_ORG_ID }}
      TF_VAR_project_name: travel-planner
      TF_VAR_preview_auth_secret: ${{ secrets.AUTH_SECRET_PREVIEW }}
      TF_VAR_preview_auth_url: ${{ vars.PREVIEW_AUTH_URL }}
      TF_VAR_neon_region_id: ${{ vars.NEON_REGION_ID }}
      TF_VAR_sentry_dsn_public: ${{ vars.SENTRY_DSN_PUBLIC }}
      TF_VAR_sentry_org: ${{ vars.SENTRY_ORG }}
      TF_VAR_sentry_project: ${{ vars.SENTRY_PROJECT }}
      TF_VAR_sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Build open preview map
        id: open_previews
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          manual_open_previews='${{ inputs.open_previews_json }}'
          if [[ -n "$manual_open_previews" ]]; then
            open_previews="$manual_open_previews"
          else
            open_previews="$(gh api \
              -X GET \
              repos/${{ github.repository }}/pulls \
              --paginate \
              -f state=open \
              --jq 'map({(.number|tostring): .head.ref}) | add // {}')"
          fi
          echo "open_previews=${open_previews}" >> "$GITHUB_OUTPUT"

      - name: Configure backend
        run: |
          cat > infra/stacks/preview/backend.hcl <<'BACKEND'
          organization = "${{ vars.TFC_ORGANIZATION }}"
          workspaces {
            name = "travel-planner-preview"
          }
          BACKEND

      - name: Init
        run: terraform -chdir=infra/stacks/preview init -input=false -backend-config=backend.hcl

      - name: Plan
        env:
          TF_VAR_open_previews: ${{ steps.open_previews.outputs.open_previews }}
        run: terraform -chdir=infra/stacks/preview plan -input=false

      - name: Apply
        env:
          TF_VAR_open_previews: ${{ steps.open_previews.outputs.open_previews }}
        run: terraform -chdir=infra/stacks/preview apply -auto-approve -input=false
