name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # Uses GITHUB_TOKEN by default.
          # Swap for a PAT (secret: RELEASE_PAT) if CI checks need to run on
          # the Release PR — GITHUB_TOKEN-triggered pushes do not re-trigger CI.
