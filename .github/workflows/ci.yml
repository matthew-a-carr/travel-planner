name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual runs for validating/measuring CI changes on a branch before a PR exists
  workflow_dispatch:

# Cancel in-progress runs for the same branch when a newer push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which areas changed so the macOS mobile job can skip cheaply ──

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # paths-filter needs an explicit base on workflow_dispatch (push/PR
          # events infer it). Empty string = unset for the other events.
          base: ${{ github.event_name == 'workflow_dispatch' && 'main' || '' }}
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  # ── All checks run in parallel ─────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm db:check:migrations
      - run: pnpm openapi:check

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:unit

  # Testcontainers starts a throwaway postgres:16-alpine container inside
  # the Vitest globalSetup hook, sets POSTGRES_URL, runs Drizzle migrations,
  # and tears it down in teardown. Docker is available by default on
  # ubuntu-latest runners. No additional service containers are required.

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:integration

  # PostgreSQL is no longer a GitHub Actions service container.
  # Testcontainers starts a throwaway postgres:16-alpine container inside
  # the Playwright globalSetup hook, writes the dynamic POSTGRES_URL to
  # process.env, and tears it down in globalTeardown.
  # Docker is available by default on ubuntu-latest runners.

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    env:
      # AUTH_SECRET must be set for next-auth to initialise — value is not a real secret
      AUTH_SECRET: ci-only-not-a-real-secret-replace-in-production
      # Dummy OAuth credentials — no real sign-in happens in CI
      AUTH_GOOGLE_ID: ci-placeholder-client-id
      AUTH_GOOGLE_SECRET: ci-placeholder-client-secret
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache the chromium download (~150 MB) keyed on the Playwright version —
      # re-downloading it was ~27s of every e2e run. On a hit only the OS
      # packages are (re)installed, since apt state isn't cacheable.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter @travel-planner/web exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @travel-planner/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @travel-planner/web exec playwright install-deps chromium

      - name: Build application
        # A syntactically-valid dummy POSTGRES_URL is required so that drizzle
        # can be instantiated (for DrizzleAdapter's instanceof checks) without
        # throwing. No queries run during next build — the postgres library only
        # opens a TCP connection on the first query. next start (run by pnpm
        # test:e2e:web via Playwright webServer) re-evaluates modules with the
        # real POSTGRES_URL set by Testcontainers globalSetup.
        run: POSTGRES_URL=postgresql://build:build@localhost:5432/build pnpm build

      - name: Run web e2e tests
        # Scoped to web-only (Playwright) because this is a Linux runner.
        # Mobile e2e (Maestro) runs in the path-filtered `mobile-e2e` job
        # on macOS — see ADR-055.
        run: pnpm test:e2e:web

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Mobile (apps/mobile/) — path-filtered per ADR 052 ──────────────────────
  #
  # mobile-typecheck / mobile-unit-test run on Linux when apps/mobile/**
  # (or the lockfile/workspace config) changes.
  # mobile-e2e runs on macOS only — macOS runner cost is ~10× Linux.
  #
  # Lint is NOT split per app: the top-level `lint` job runs Biome from the
  # repo root, and biome.json's `includes` covers both apps/web/src/** and
  # apps/mobile/app/** + apps/mobile/*.{ts,tsx,js,mjs}. One lint check, one
  # source of truth.

  mobile-typecheck:
    name: Mobile type-check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @travel-planner/mobile type-check

  mobile-unit-test:
    name: Mobile unit tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @travel-planner/mobile test

  mobile-e2e:
    name: Mobile e2e (Maestro)
    runs-on: macos-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache the slow-to-rebuild outputs: the generated ios/ project
      # (Pods + xcodebuild DerivedData), the CocoaPods download cache,
      # and the Maestro CLI install. Key on the source-of-truth files
      # that determine the native build's contents: pnpm-lock, the
      # mobile app's package.json, and app.json (Expo plugins + native
      # config). When any of those change, the cache is invalidated and
      # the next run rebuilds from scratch.
      - name: Cache mobile native build outputs
        id: mobile-cache
        uses: actions/cache@v5
        with:
          path: |
            apps/mobile/ios
            ~/Library/Caches/CocoaPods
            ~/.maestro
          key: mobile-e2e-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json') }}
          restore-keys: |
            mobile-e2e-${{ runner.os }}-

      - name: Install Maestro
        if: steps.mobile-cache.outputs.cache-hit != 'true'
        run: curl -fsSL "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Start booting the simulator in the background as early as
      # possible — boot takes ~60s on a fresh runner and is independent
      # of the build, so overlapping it with prebuild + pod install +
      # xcodebuild claws that minute back.
      - name: Boot iOS Simulator (background)
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime, devs in devices.items():
              if 'iOS' not in runtime:
                  continue
              for d in devs:
                  if d.get('isAvailable') and 'iPhone' in d.get('name', ''):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          echo "Booting simulator $UDID (background)"
          xcrun simctl boot "$UDID" || true  # already-booted is fine

      - name: Prebuild iOS native project
        working-directory: apps/mobile
        env:
          CACHE_HIT: ${{ steps.mobile-cache.outputs.cache-hit }}
        # On an EXACT cache hit (`cache-hit == 'true'` — primary key matched,
        # i.e. the lockfile/package.json/app.json are unchanged, as on `main`
        # or a re-run) the cached ios/ Pods + DerivedData match the dependency
        # graph, so an incremental prebuild is safe and fast.
        #
        # On a key MISS — which is EVERY dependency PR, since the lockfile hash
        # changes — `actions/cache` falls back to a `restore-keys` prefix match
        # and reports `cache-hit == 'false'`. That restored ios/ is from a
        # DIFFERENT dependency graph; an incremental (non-`--clean`) prebuild
        # builds on top of that stale Pods/DerivedData state and produces an
        # app that crashes or hangs on launch (the root cause of the
        # mobile-e2e "flakiness" — TD-009). Force a clean regeneration here so
        # the native build always matches the actual dependencies.
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "Exact cache hit — incremental prebuild"
            pnpm exec expo prebuild --platform ios
          else
            echo "Cache key miss (deps changed / restore-key fallback) — clean prebuild to avoid stale native state"
            pnpm exec expo prebuild --platform ios --clean
          fi

      - name: Install CocoaPods dependencies
        working-directory: apps/mobile/ios
        # CocoaPods ships preinstalled on macos-latest runners. On a
        # cache hit `pod install` matches Podfile.lock and is a no-op
        # in a few seconds; on a miss it does the full install.
        run: pod install

      - name: Build iOS Simulator .app via xcodebuild
        # Per ADR-055: skip EAS Local for the build (no external account
        # dependency); use raw xcodebuild against the prebuild output.
        # `CODE_SIGNING_ALLOWED=NO` avoids requiring a developer cert
        # for simulator builds.
        #
        # Build `Release` (not `Debug`): the Release config runs the
        # "Bundle React Native code and images" Xcode build phase, which
        # invokes `react-native-xcode.sh` to bundle the JS and embed it
        # in the .app. Debug builds skip this phase and rely on the
        # Metro packager being reachable at launch — which it isn't in
        # CI, so the app boots into the "No script URL provided" red
        # error screen and Maestro's `login-screen-root` assertion
        # fails.
        working-directory: apps/mobile/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Wait for iOS Simulator to finish booting
        run: xcrun simctl bootstatus "$SIM_UDID" -b

      - name: Install dev-client .app on simulator
        working-directory: apps/mobile/ios
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -maxdepth 2 -name '*.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found under build/Build/Products/Release-iphonesimulator"
            exit 1
          fi
          echo "Installing $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      # Retry the flows up to 3 attempts. The cold-sim launch of a Release
      # RN bundle is intermittently unreliable on CI runners (transient app
      # crash on launch + cold-start latency) even on code that passes on
      # `main` — see the mobile-e2e flakiness investigation. Each attempt is
      # a fresh `launchApp`, so a retry recovers a transient launch failure.
      # This is flakiness tolerance, NOT masking a deterministic bug: a
      # persistent failure still fails all 3 attempts (and the crash-
      # diagnostics upload below captures a real crash for triage).
      - name: Run Maestro flows
        run: |
          for attempt in 1 2 3; do
            echo "::group::Maestro attempt $attempt"
            if pnpm test:e2e:mobile; then
              echo "::endgroup::"
              echo "Maestro passed on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Maestro attempt $attempt failed"
            xcrun simctl terminate "$SIM_UDID" dev.matthewcarr.travelplanner 2>/dev/null || true
          done
          echo "::error::Maestro failed after 3 attempts"
          exit 1

      - name: Upload Maestro report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-report
          path: ~/.maestro/tests
          retention-days: 7

      # Capture iOS crash reports so a *persistent* app crash (one that
      # survives all 3 retries) is diagnosable — the Maestro report alone
      # doesn't include the native crash stack. Both the host path and the
      # simulator's own DiagnosticReports are collected.
      - name: Upload iOS crash diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-crash-diagnostics
          path: |
            ~/Library/Logs/DiagnosticReports/
            ~/Library/Developer/CoreSimulator/Devices/${{ env.SIM_UDID }}/data/Library/Logs/DiagnosticReports/
          retention-days: 7
          if-no-files-found: ignore
