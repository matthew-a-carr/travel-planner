name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual runs for validating/measuring CI changes on a branch before a PR exists
  workflow_dispatch:
    inputs:
      mobile:
        description: Force-run the mobile jobs even when no mobile paths changed
        type: boolean
        default: false

# Cancel in-progress runs for the same branch when a newer push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which areas changed so the macOS mobile job can skip cheaply ──

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # paths-filter needs an explicit base on workflow_dispatch (push/PR
          # events infer it). Empty string = unset for the other events.
          base: ${{ github.event_name == 'workflow_dispatch' && 'main' || '' }}
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              # The wire contract the mobile app consumes (EPIC-004 §10):
              # schema changes must re-run the mobile jobs even when no
              # mobile file changed.
              - 'packages/shared/**'
              # The mobile jobs are defined here — a PR that edits the
              # workflow (e.g. the xcodebuild invocation) must run them.
              - '.github/workflows/ci.yml'

  # ── All checks run in parallel ─────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm db:check:migrations
      - run: pnpm openapi:check
      - run: pnpm visa:schema:check

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:unit

  # Testcontainers starts a throwaway postgres:16-alpine container inside
  # the Vitest globalSetup hook, sets POSTGRES_URL, runs Drizzle migrations,
  # and tears it down in teardown. Docker is available by default on
  # ubuntu-latest runners. No additional service containers are required.

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:integration

  # PostgreSQL is no longer a GitHub Actions service container.
  # Testcontainers starts a throwaway postgres:16-alpine container inside
  # the Playwright globalSetup hook, writes the dynamic POSTGRES_URL to
  # process.env, and tears it down in globalTeardown.
  # Docker is available by default on ubuntu-latest runners.

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    env:
      # AUTH_SECRET must be set for next-auth to initialise — value is not a real secret
      AUTH_SECRET: ci-only-not-a-real-secret-replace-in-production
      # Dummy OAuth credentials — no real sign-in happens in CI
      AUTH_GOOGLE_ID: ci-placeholder-client-id
      AUTH_GOOGLE_SECRET: ci-placeholder-client-secret
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache the chromium download (~150 MB) keyed on the Playwright version —
      # re-downloading it was ~27s of every e2e run. On a hit only the OS
      # packages are (re)installed, since apt state isn't cacheable.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter @travel-planner/web exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @travel-planner/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @travel-planner/web exec playwright install-deps chromium

      - name: Build application
        # A syntactically-valid dummy POSTGRES_URL is required so that drizzle
        # can be instantiated (for DrizzleAdapter's instanceof checks) without
        # throwing. No queries run during next build — the postgres library only
        # opens a TCP connection on the first query. next start (run by pnpm
        # test:e2e:web via Playwright webServer) re-evaluates modules with the
        # real POSTGRES_URL set by Testcontainers globalSetup.
        run: POSTGRES_URL=postgresql://build:build@localhost:5432/build pnpm build

      - name: Run web e2e tests
        # Scoped to web-only (Playwright) because this is a Linux runner.
        # Mobile e2e (Maestro) runs in the path-filtered `mobile-e2e` job
        # on macOS — see ADR-055.
        run: pnpm test:e2e:web

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Mobile (apps/mobile/) — path-filtered per ADR 052 ──────────────────────
  #
  # mobile-typecheck / mobile-unit-test run on Linux when apps/mobile/**
  # (or the lockfile/workspace config) changes.
  # mobile-e2e runs on macOS only — macOS runner cost is ~10× Linux.
  #
  # Lint is NOT split per app: the top-level `lint` job runs Biome from the
  # repo root, and biome.json's `includes` covers both apps/web/src/** and
  # apps/mobile/app/** + apps/mobile/*.{ts,tsx,js,mjs}. One lint check, one
  # source of truth.

  mobile-typecheck:
    name: Mobile type-check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true' || inputs.mobile
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @travel-planner/mobile type-check

  mobile-unit-test:
    name: Mobile unit tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true' || inputs.mobile
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @travel-planner/mobile test

  mobile-e2e:
    name: Mobile e2e (Maestro)
    runs-on: macos-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true' || inputs.mobile

    # The job boots the real Next.js server against a native PostgreSQL
    # (SPEC-013 / ADR 060 — no Docker on macOS runners). The auth env
    # lives at job level because next-auth needs it during `next build`,
    # not just at runtime — same pattern as the web e2e job above. None
    # of these are real secrets.
    env:
      AUTH_SECRET: ci-only-not-a-real-secret-replace-in-production
      AUTH_JWT_SIGNING_KEY: e2e-only-jwt-signing-key-do-not-use-in-prod
      AUTH_GOOGLE_ID: ci-placeholder-client-id
      AUTH_GOOGLE_SECRET: ci-placeholder-client-secret
      AUTH_URL: http://127.0.0.1:3000
      # The app reaches the backend on the runner's LAN IP (SPEC-014), not the
      # AUTH_URL host, so next-auth must trust the inbound host (e.g. the
      # /api/auth/providers canary) rather than reject it as untrusted.
      AUTH_TRUST_HOST: 'true'
      # SPEC-014 / EPIC-004 slice 2: enables the gated test-auth seam
      # (POST /api/v1/auth/mobile/test-token) on the backend the server boots
      # below, so Maestro can sign in without Google. The endpoint 404s
      # everywhere else — double-gated (this flag AND never on Vercel; neither
      # flag is ever defined in Terraform or any Vercel env). The
      # signed-in-journey flow depends on it.
      E2E_TEST_AUTH: '1'

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache the slow-to-rebuild outputs: the generated ios/ project
      # (Pods + xcodebuild DerivedData), the CocoaPods download cache,
      # and the Maestro CLI install. Key on the source-of-truth files
      # that determine the native build's contents: pnpm-lock, the
      # mobile app's package.json, and app.json (Expo plugins + native
      # config). When any of those change, the cache is invalidated and
      # the next run rebuilds from scratch.
      - name: Cache mobile native build outputs
        id: mobile-cache
        uses: actions/cache@v5
        with:
          path: |
            apps/mobile/ios
            ~/Library/Caches/CocoaPods
            ~/.maestro
          key: mobile-e2e-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json') }}
          restore-keys: |
            mobile-e2e-${{ runner.os }}-

      - name: Install Maestro
        if: steps.mobile-cache.outputs.cache-hit != 'true'
        run: curl -fsSL "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # ── Real backend (SPEC-013 / ADR 060) ────────────────────────────
      # Native PostgreSQL (no Docker on macOS runners) + migrate + seed +
      # production Next.js server, so Maestro drives an app that talks to
      # a live backend. The server boots in the background and is only
      # awaited by the canary step after xcodebuild — its boot overlaps
      # the native build, same trick as the simulator below.

      - name: Start PostgreSQL (native)
        run: apps/mobile/scripts/ci/start-postgres.sh

      - name: Migrate + seed database
        run: |
          pnpm db:migrate
          pnpm db:seed
          pnpm seed:e2e

      # The Next build cache is independent of the mobile native cache
      # (TD-009: that one's key/--clean discipline is deliberately
      # untouched). Mobile-only PRs don't change these paths, so they get
      # warm Next builds.
      - name: Cache Next.js build cache
        uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          # Hash sources only — a bare apps/web/** would sweep node_modules
          # (slow + non-deterministic postinstall output would rotate the
          # key every run, silently degrading to the restore-keys prefix).
          key: mobile-e2e-next-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/web/src/**', 'apps/web/package.json', 'apps/web/next.config.*', 'packages/shared/src/**') }}
          restore-keys: |
            mobile-e2e-next-${{ runner.os }}-

      - name: Build web app
        # Dummy POSTGRES_URL per ADR 010 — the build never connects, and
        # staying DB-independent keeps this step free to move/cache.
        env:
          POSTGRES_URL: postgresql://build:build@localhost:5432/build
        run: pnpm build

      # The iOS Simulator cannot reach the host's loopback (127.0.0.1) on the
      # GitHub macOS runner — proven by SPEC-014's on-device reachability probe
      # (the runner-side canary/seam-smoke reach 127.0.0.1 fine, the app does
      # not). The sim CAN reach the host's LAN IP, so we bind the server to all
      # interfaces (start-backend.sh: -H 0.0.0.0) and point the app at the
      # runner's en0 address — the same approach `pnpm dev:mobile` uses for
      # physical devices.
      - name: Detect runner host IP for the simulator
        run: |
          set -euo pipefail
          HOST_IP=$(ipconfig getifaddr en0 || true)
          [ -z "$HOST_IP" ] && HOST_IP=$(ipconfig getifaddr en1 || true)
          if [ -z "$HOST_IP" ]; then
            echo "::error::Could not determine the runner host IP (en0/en1)"
            exit 1
          fi
          echo "Runner host IP: $HOST_IP"
          echo "HOST_IP=$HOST_IP" >> "$GITHUB_ENV"

      - name: Start backend server (background)
        run: apps/mobile/scripts/ci/start-backend.sh

      # Start booting the simulator in the background as early as
      # possible — boot takes ~60s on a fresh runner and is independent
      # of the build, so overlapping it with prebuild + pod install +
      # xcodebuild claws that minute back.
      - name: Boot iOS Simulator (background)
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime, devs in devices.items():
              if 'iOS' not in runtime:
                  continue
              for d in devs:
                  if d.get('isAvailable') and 'iPhone' in d.get('name', ''):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          echo "Booting simulator $UDID (background)"
          xcrun simctl boot "$UDID" || true  # already-booted is fine

      - name: Prebuild iOS native project
        working-directory: apps/mobile
        env:
          CACHE_HIT: ${{ steps.mobile-cache.outputs.cache-hit }}
        # On an EXACT cache hit (`cache-hit == 'true'` — primary key matched,
        # i.e. the lockfile/package.json/app.json are unchanged, as on `main`
        # or a re-run) the cached ios/ Pods + DerivedData match the dependency
        # graph, so an incremental prebuild is safe and fast.
        #
        # On a key MISS — which is EVERY dependency PR, since the lockfile hash
        # changes — `actions/cache` falls back to a `restore-keys` prefix match
        # and reports `cache-hit == 'false'`. That restored ios/ is from a
        # DIFFERENT dependency graph; an incremental (non-`--clean`) prebuild
        # builds on top of that stale Pods/DerivedData state and produces an
        # app that crashes or hangs on launch (the root cause of the
        # mobile-e2e "flakiness" — TD-009). Force a clean regeneration here so
        # the native build always matches the actual dependencies.
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "Exact cache hit — incremental prebuild"
            pnpm exec expo prebuild --platform ios
          else
            echo "Cache key miss (deps changed / restore-key fallback) — clean prebuild to avoid stale native state"
            pnpm exec expo prebuild --platform ios --clean
          fi

      - name: Install CocoaPods dependencies
        working-directory: apps/mobile/ios
        # CocoaPods ships preinstalled on macos-latest runners. On a
        # cache hit `pod install` matches Podfile.lock and is a no-op
        # in a few seconds; on a miss it does the full install.
        run: pod install

      - name: Build iOS Simulator .app via xcodebuild
        # Per ADR-055: skip EAS Local for the build (no external account
        # dependency); use raw xcodebuild against the prebuild output.
        # `CODE_SIGNING_ALLOWED=NO` avoids requiring a developer cert
        # for simulator builds.
        #
        # Build `Release` (not `Debug`): the Release config runs the
        # "Bundle React Native code and images" Xcode build phase, which
        # invokes `react-native-xcode.sh` to bundle the JS and embed it
        # in the .app. Debug builds skip this phase and rely on the
        # Metro packager being reachable at launch — which it isn't in
        # CI, so the app boots into the "No script URL provided" red
        # error screen and Maestro's `login-screen-root` assertion
        # fails.
        working-directory: apps/mobile/ios
        env:
          # SPEC-014 / EPIC-004 slice 2: selects the test-auth browser leg
          # (src/auth/e2e-browser-leg.ts) at bundle time, so the signed-in
          # journey signs in via the server seam instead of Google. Pairs with
          # the job-level E2E_TEST_AUTH that enables the server endpoint. A
          # CI-only, non-secret flag — never defined in any Vercel env.
          EXPO_PUBLIC_E2E_AUTH: '1'
        run: |
          # EXPO_PUBLIC_API_BASE_URL points at the runner's LAN IP, not
          # 127.0.0.1: the iOS Simulator cannot reach the host's loopback on the
          # GitHub macOS runner but can reach its LAN address (SPEC-014); the
          # backend binds 0.0.0.0 to answer on it. Exported here (rather than in
          # the step `env:`) so the value comes straight from the HOST_IP shell
          # env without a workflow expression. The "Bundle React Native code and
          # images" phase inherits this exported env and inlines it.
          export EXPO_PUBLIC_API_BASE_URL="http://${HOST_IP}:3000"
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace=$WORKSPACE scheme=$SCHEME against $EXPO_PUBLIC_API_BASE_URL"
          # ARCHS=arm64: the .app only ever runs on this runner's own (arm64)
          # simulator, but Release defaults to ONLY_ACTIVE_ARCH=NO and compiles
          # every Pod for x86_64 too — roughly doubling compile time for slices
          # that are thrown away.
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO

      # Two fail-fast gates before any Maestro time is spent (SPEC-013):
      # (1) the backend is actually serving — surfacing the server log
      # inline on failure; (2) the Release JS bundle really inlined the
      # backend URL. The RN bundle phase declares no input/output files
      # so Xcode re-runs it every build even with cached DerivedData —
      # this assertion turns that belief into a loud check (epic Q3): if
      # a future Xcode/RN change starts skipping the phase, or Hermes
      # stops exposing the string, this fails instead of the env silently
      # going stale.
      - name: Backend canary + bundle URL assertion
        working-directory: apps/mobile/ios
        run: |
          echo "::group::Backend canary"
          # Curl the LAN IP (not loopback) to prove the 0.0.0.0 bind answers on
          # the same address the simulator will use (SPEC-014).
          if ! curl --fail --silent --show-error --retry 30 --retry-delay 2 --retry-all-errors \
              "http://${HOST_IP}:3000/api/auth/providers" >/dev/null; then
            echo "::error::Backend canary failed — server not responding on ${HOST_IP}:3000"
            echo "── tail of backend.log ──"
            tail -n 80 "$RUNNER_TEMP/backend.log" || true
            exit 1
          fi
          echo "Backend is serving on ${HOST_IP}:3000."
          echo "::endgroup::"

          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -maxdepth 2 -name '*.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found under build/Build/Products/Release-iphonesimulator"
            exit 1
          fi
          BUNDLE=$(find "$APP_PATH" -maxdepth 1 -name 'main.jsbundle' | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "::error::No main.jsbundle inside $APP_PATH — Release bundle phase did not run?"
            exit 1
          fi
          # Via a temp file rather than `strings | grep -q`: grep -q's early
          # exit can SIGPIPE strings (status 141) if this step ever gains
          # `shell: bash` (which GitHub runs with -o pipefail).
          strings "$BUNDLE" > "$RUNNER_TEMP/bundle-strings.txt"
          if ! grep -qF "${HOST_IP}:3000" "$RUNNER_TEMP/bundle-strings.txt"; then
            echo "::error::EXPO_PUBLIC_API_BASE_URL (${HOST_IP}:3000) not found in the JS bundle — env was not inlined"
            exit 1
          fi
          echo "Bundle contains the backend URL (${HOST_IP}:3000) — env inlined correctly."

          # SPEC-014: prove EXPO_PUBLIC_E2E_AUTH inlined so the signed-in
          # journey uses the test-auth substitute, not the real Google browser
          # leg (which would hang Maestro). e2e-browser-leg.ts folds the flag to
          # exactly one marker; _ON means the substitute is wired, _OFF means
          # the flag did not reach the bundle.
          if grep -q 'SPEC014_E2E_AUTH_BUNDLE_OFF' "$RUNNER_TEMP/bundle-strings.txt"; then
            echo "::error::EXPO_PUBLIC_E2E_AUTH did NOT inline to '1' — substitute browser leg is OFF in the bundle"
            exit 1
          fi
          if ! grep -q 'SPEC014_E2E_AUTH_BUNDLE_ON' "$RUNNER_TEMP/bundle-strings.txt"; then
            echo "::error::E2E auth bundle marker missing entirely — e2e-browser-leg not bundled as expected"
            exit 1
          fi
          echo "E2E test-auth substitute is wired into the bundle (marker ON)."

      # Server half of the test-auth seam (SPEC-014), exercised from the runner
      # before any Maestro time is spent: /start → /test-token must mint a
      # `?code=` deep link. This proves E2E_TEST_AUTH gated the endpoint ON and
      # the mint path + DB work, so a red signed-in-journey flow downstream is
      # unambiguously the *client* half (bundle flag / app networking), not the
      # server. 43-char challenge satisfies the start schema (min 43).
      - name: Test-auth seam smoke (server half)
        run: |
          set -euo pipefail
          echo "::group::Seam smoke"
          CHALLENGE="0123456789012345678901234567890123456789012"
          START=$(curl --fail --silent --show-error -X POST \
            "http://${HOST_IP}:3000/api/v1/auth/mobile/start" \
            -H 'Content-Type: application/json' \
            -d "{\"code_challenge\":\"$CHALLENGE\"}")
          STATE=$(printf '%s' "$START" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['state'])")
          MINT=$(curl --fail --silent --show-error -X POST \
            "http://${HOST_IP}:3000/api/v1/auth/mobile/test-token" \
            -H 'Content-Type: application/json' \
            -d "{\"state\":\"$STATE\"}")
          printf '%s' "$MINT" | python3 -c "
          import sys, json
          url = json.load(sys.stdin)['data']['redirect_url']
          assert 'code=' in url, f'expected a ?code= deep link, got: {url}'
          print('Seam server half OK — minted', url[:34], '…')
          "
          echo "::endgroup::"

      - name: Wait for iOS Simulator to finish booting
        run: xcrun simctl bootstatus "$SIM_UDID" -b

      - name: Install dev-client .app on simulator
        working-directory: apps/mobile/ios
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -maxdepth 2 -name '*.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found under build/Build/Products/Release-iphonesimulator"
            exit 1
          fi
          echo "Installing $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      # Retry the flows up to 3 attempts. The cold-sim launch of a Release
      # RN bundle is intermittently unreliable on CI runners (transient app
      # crash on launch + cold-start latency) even on code that passes on
      # `main` — see the mobile-e2e flakiness investigation. Each attempt is
      # a fresh `launchApp`, so a retry recovers a transient launch failure.
      # This is flakiness tolerance, NOT masking a deterministic bug: a
      # persistent failure still fails all 3 attempts (and the crash-
      # diagnostics upload below captures a real crash for triage).
      - name: Run Maestro flows
        run: |
          for attempt in 1 2 3; do
            echo "::group::Maestro attempt $attempt"
            if pnpm test:e2e:mobile; then
              echo "::endgroup::"
              echo "Maestro passed on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Maestro attempt $attempt failed"
            xcrun simctl terminate "$SIM_UDID" dev.matthewcarr.travelplanner 2>/dev/null || true
          done
          echo "::error::Maestro failed after 3 attempts"
          exit 1

      - name: Upload Maestro report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-report
          path: ~/.maestro/tests
          retention-days: 7

      # The server's own log is the only way to debug a backend-side e2e
      # failure post-mortem (SPEC-013; full diagnostics slice is EPIC-004
      # slice 4 — this minimal artifact lands early because slice 1 itself
      # is undebuggable without it).
      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-log
          path: ${{ runner.temp }}/backend.log
          retention-days: 7
          if-no-files-found: ignore

      # Capture iOS crash reports so a *persistent* app crash (one that
      # survives all 3 retries) is diagnosable — the Maestro report alone
      # doesn't include the native crash stack. Both the host path and the
      # simulator's own DiagnosticReports are collected.
      - name: Upload iOS crash diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-crash-diagnostics
          path: |
            ~/Library/Logs/DiagnosticReports/
            ~/Library/Developer/CoreSimulator/Devices/${{ env.SIM_UDID }}/data/Library/Logs/DiagnosticReports/
          retention-days: 7
          if-no-files-found: ignore
