name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch when a newer push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which areas changed so the macOS mobile job can skip cheaply ──

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  # ── All checks run in parallel ─────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm db:check:migrations

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:unit

  # Testcontainers starts a throwaway postgres:16-alpine container inside
  # the Vitest globalSetup hook, sets POSTGRES_URL, runs Drizzle migrations,
  # and tears it down in teardown. Docker is available by default on
  # ubuntu-latest runners. No additional service containers are required.

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:integration

  # PostgreSQL is no longer a GitHub Actions service container.
  # Testcontainers starts a throwaway postgres:16-alpine container inside
  # the Playwright globalSetup hook, writes the dynamic POSTGRES_URL to
  # process.env, and tears it down in globalTeardown.
  # Docker is available by default on ubuntu-latest runners.

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    env:
      # AUTH_SECRET must be set for next-auth to initialise — value is not a real secret
      AUTH_SECRET: ci-only-not-a-real-secret-replace-in-production
      # Dummy OAuth credentials — no real sign-in happens in CI
      AUTH_GOOGLE_ID: ci-placeholder-client-id
      AUTH_GOOGLE_SECRET: ci-placeholder-client-secret
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @travel-planner/web exec playwright install --with-deps chromium

      - name: Build application
        # A syntactically-valid dummy POSTGRES_URL is required so that drizzle
        # can be instantiated (for DrizzleAdapter's instanceof checks) without
        # throwing. No queries run during next build — the postgres library only
        # opens a TCP connection on the first query. next start (run by pnpm
        # test:e2e:web via Playwright webServer) re-evaluates modules with the
        # real POSTGRES_URL set by Testcontainers globalSetup.
        run: POSTGRES_URL=postgresql://build:build@localhost:5432/build pnpm build

      - name: Run web e2e tests
        # Scoped to web-only (Playwright) because this is a Linux runner.
        # Mobile e2e (Maestro) runs in the path-filtered `mobile-e2e` job
        # on macOS — see ADR-055.
        run: pnpm test:e2e:web

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Mobile (apps/mobile/) — path-filtered per ADR 052 ──────────────────────
  #
  # mobile-typecheck / mobile-unit-test run on Linux when apps/mobile/**
  # (or the lockfile/workspace config) changes.
  # mobile-e2e runs on macOS only — macOS runner cost is ~10× Linux.
  #
  # Lint is NOT split per app: the top-level `lint` job runs Biome from the
  # repo root, and biome.json's `includes` covers both apps/web/src/** and
  # apps/mobile/app/** + apps/mobile/*.{ts,tsx,js,mjs}. One lint check, one
  # source of truth.

  mobile-typecheck:
    name: Mobile type-check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @travel-planner/mobile type-check

  mobile-unit-test:
    name: Mobile unit tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @travel-planner/mobile test

  mobile-e2e:
    name: Mobile e2e (Maestro)
    runs-on: macos-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    # Week 1 (SPEC-006 §11 + ADR-055): non-blocking while the pipeline
    # shakes out. Promote to blocking once it has a stable track
    # record — calendar reminder gates the promotion.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Prebuild iOS native project
        working-directory: apps/mobile
        # `expo prebuild --clean` regenerates ios/ from app.json and the
        # Expo plugins. ios/ is NOT committed — ephemeral per CI run.
        run: pnpm exec expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: apps/mobile/ios
        # CocoaPods ships preinstalled on macos-latest runners.
        run: pod install

      - name: Build iOS Simulator .app via xcodebuild
        # Per ADR-055: skip EAS Local for the build (no external account
        # dependency); use raw xcodebuild against the prebuild output.
        # `CODE_SIGNING_ALLOWED=NO` avoids requiring a developer cert
        # for simulator builds.
        working-directory: apps/mobile/ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot iOS Simulator
        run: |
          # Pick the first available iPhone simulator on the runner.
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime, devs in devices.items():
              if 'iOS' not in runtime:
                  continue
              for d in devs:
                  if d.get('isAvailable') and 'iPhone' in d.get('name', ''):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID" || true  # already-booted is fine
          xcrun simctl bootstatus "$UDID" -b

      - name: Install dev-client .app on simulator
        working-directory: apps/mobile/ios
        run: |
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 2 -name '*.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found under build/Build/Products/Debug-iphonesimulator"
            exit 1
          fi
          echo "Installing $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro flows
        run: pnpm test:e2e:mobile

      - name: Upload Maestro report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-report
          path: ~/.maestro/tests
          retention-days: 7
